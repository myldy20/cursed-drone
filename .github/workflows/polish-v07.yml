name: polish-v07-brick-labels

on:
  pull_request:
    branches: [agent/v0.6-sound-engines]
    paths:
      - .github/workflows/polish-v07.yml

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.7-brick-production
          fetch-depth: 0
      - name: Fix physical controls and casing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def patch(path, changes):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              for old, new in changes:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one match, found {count}: {old}')
                  text = text.replace(old, new)
              p.write_text(text, encoding='utf-8')

          patch('README.md', [
              ('| confirm / cancel picker | E or Enter / Escape | A / B |',
               '| confirm / cancel picker | E or Enter / Escape | B / A |'),
              ('| mute selected track | Space | A outside a picker |',
               '| mute selected track | Space | B outside a picker |'),
              ('| clear voices and effect tails | K | B outside a picker |',
               '| clear voices and effect tails | K | A outside a picker |'),
              ('| подтвердить / отменить выбор | E или Enter / Escape | A / B |',
               '| подтвердить / отменить выбор | E или Enter / Escape | B / A |'),
              ('| mute выбранной дорожки | Space | A вне окна выбора |',
               '| mute выбранной дорожки | Space | B вне окна выбора |'),
              ('| очистить голоса и хвосты эффектов | K | B вне окна выбора |',
               '| очистить голоса и хвосты эффектов | K | A вне окна выбора |'),
          ])

          patch('src/i18n.cpp', [
              ('    "Язык",\n    "Слот",\n    "Движок",\n    "Эффекты",\n    "Модуляторы",\n    "Мастер",\n    "Частота",\n    "Тембр",\n    "Цвет",\n    "Движение",\n    "Текстура",\n    "Уровень",\n    "Панорама",\n    "заглушён",\n    "работает",',
               '    "ЯЗЫК",\n    "СЛОТ",\n    "ДВИЖОК",\n    "ЭФФЕКТЫ",\n    "МОДУЛЯТОРЫ",\n    "МАСТЕР",\n    "ЧАСТОТА",\n    "ТЕМБР",\n    "ЦВЕТ",\n    "ДВИЖЕНИЕ",\n    "ТЕКСТУРА",\n    "УРОВЕНЬ",\n    "ПАНОРАМА",\n    "ЗАГЛУШЁН",\n    "РАБОТАЕТ",'),
              ('    "Language",\n    "Slot",\n    "Engine",\n    "Effects",\n    "Modulators",\n    "Master",\n    "Frequency",\n    "Timbre",\n    "Color",\n    "Motion",\n    "Texture",\n    "Level",\n    "Pan",\n    "muted",\n    "running",',
               '    "LANGUAGE",\n    "SLOT",\n    "ENGINE",\n    "EFFECTS",\n    "MODULATORS",\n    "MASTER",\n    "FREQUENCY",\n    "TIMBRE",\n    "COLOR",\n    "MOTION",\n    "TEXTURE",\n    "LEVEL",\n    "PAN",\n    "MUTED",\n    "RUNNING",'),
          ])

          patch('src/sdl_main.cpp', [
              ('        cd::ui::draw_text(renderer, 92, 334,\n            ru(session) ? "^/V ВЫБОР   E ПРИНЯТЬ   ESC НАЗАД"\n                        : "^/V SELECT   E APPLY   ESC BACK", kDim);',
               '        cd::ui::draw_text(renderer, 92, 334,\n            handheld()\n                ? (ru(session) ? "^/V ВЫБОР   B ПРИНЯТЬ   A НАЗАД"\n                               : "^/V SELECT   B APPLY   A BACK")\n                : (ru(session) ? "^/V ВЫБОР   E ПРИНЯТЬ   ESC НАЗАД"\n                               : "^/V SELECT   E APPLY   ESC BACK"), kDim);'),
              ('        cd::ui::draw_text(renderer, 92, 334,\n            ru(session) ? "</> ГРУППА  ^/V ДВИЖОК  E OK  ESC НАЗАД"\n                        : "</> GROUP  ^/V ENGINE  E OK  ESC BACK", kDim);',
               '        cd::ui::draw_text(renderer, 92, 334,\n            handheld()\n                ? (ru(session) ? "</> ГРУППА  ^/V ДВИЖОК  B OK  A НАЗАД"\n                               : "</> GROUP  ^/V ENGINE  B OK  A BACK")\n                : (ru(session) ? "</> ГРУППА  ^/V ДВИЖОК  E OK  ESC НАЗАД"\n                               : "</> GROUP  ^/V ENGINE  E OK  ESC BACK"), kDim);'),
              ('        cd::ui::draw_text(renderer, 92, 334,\n            ru(session) ? "СТРЕЛКИ ВЫБОР   E OK   ESC НАЗАД"\n                        : "ARROWS SELECT   E OK   ESC BACK", kDim);',
               '        cd::ui::draw_text(renderer, 92, 334,\n            handheld()\n                ? (ru(session) ? "СТРЕЛКИ ВЫБОР   B OK   A НАЗАД"\n                               : "ARROWS SELECT   B OK   A BACK")\n                : (ru(session) ? "СТРЕЛКИ ВЫБОР   E OK   ESC НАЗАД"\n                               : "ARROWS SELECT   E OK   ESC BACK"), kDim);'),
          ])
          PY
          git diff --check
      - name: Build core and tests
        run: |
          cmake -S . -B build-polish -DCMAKE_BUILD_TYPE=Release -DCURSED_DRONE_BUILD_SDL=OFF
          cmake --build build-polish --parallel 2
          ctest --test-dir build-polish --output-on-failure
      - name: Commit label polish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md src/i18n.cpp src/sdl_main.cpp
          git commit -m "Polish Brick controls and interface labels"
          git push origin HEAD:agent/v0.7-brick-production
