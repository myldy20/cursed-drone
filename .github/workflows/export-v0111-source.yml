name: export-v0111-source

on:
  push:
    branches: [experiment/v0.11-guided-workflow]
    paths:
      - .github/workflows/export-v0111-source.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Export source tree
        run: |
          rm -rf .git
          tar -czf /tmp/cursed-drone-v0111-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-v0111-source
          path: /tmp/cursed-drone-v0111-source.tar.gz
          if-no-files-found: error
