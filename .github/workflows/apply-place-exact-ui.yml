name: exact-place-diagnostics

on:
  pull_request:
    types: [reopened]

jobs:
  diagnose:
    if: github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsdl2-dev python3-pil fonts-dejavu-core
      - name: Generate exact Place product files
        run: python3 scripts/apply_place_exact_ui.py
      - name: Configure
        run: cmake -S . -B build-place -DCMAKE_BUILD_TYPE=Release > place-config.log 2>&1
      - name: Compile exact Place renderer
        id: compile
        continue-on-error: true
        run: |
          cmake --build build-place --parallel 2 --target \
            cursed-drone-tests \
            cursed-drone-parameter-mapping-tests \
            cursed-drone-android-ui-snapshots > place-build.log 2>&1
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-place-compiler-diagnostics
          path: |
            place-config.log
            place-build.log
            android/app/src/main/cpp/approved_ui_font.inc
            android/app/src/main/cpp/approved_ui_font_data.hpp
            android/app/src/main/cpp/approved_ui_place_exact.inc
            android/app/src/main/cpp/approved_ui_primitives.inc
      - name: Stop after compiler failure
        if: steps.compile.outcome == 'failure'
        run: exit 1
