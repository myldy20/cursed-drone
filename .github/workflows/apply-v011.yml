name: apply-v011-guided-workflow

on:
  pull_request:
    branches: [experiment/plaits-performance-lab]
    paths:
      - tools/v011parts/**
      - .github/workflows/apply-v011.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: experiment/v0.11-guided-workflow
          fetch-depth: 0
          submodules: recursive

      - name: Reconstruct and verify patch
        run: |
          cat tools/v011parts/* > /tmp/v011.patch.gz.b64
          test "$(wc -c < /tmp/v011.patch.gz.b64)" -eq 42708
          echo '91cf9a9ec146b2b30394929e415a7ebbad60eb1d425a3d530e089faab0e73868  /tmp/v011.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/v011.patch.gz.b64 | gzip -d > /tmp/v011.patch
          echo 'eedd5211c8a86aaa208659f1f92cbd78fd865bf10ea06548d66142685bcf0886  /tmp/v011.patch' | sha256sum -c -
          git apply --check /tmp/v011.patch

      - name: Apply guided workflow source
        run: git apply /tmp/v011.patch

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev zip

      - name: Configure and build
        run: |
          cmake -S . -B build-v011 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v011 --parallel 2

      - name: Run tests
        run: ctest --test-dir build-v011 --output-on-failure

      - name: SDL startup smoke test
        run: |
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            CURSED_DRONE_SKIP_SPLASH=1 CURSED_DRONE_HANDHELD=1 \
            CURSED_DRONE_DATA_DIR="$PWD/test-conf" \
            timeout 4s build-v011/cursed-drone-sdl
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124

      - name: Build Lab package
        run: |
          chmod +x tools/package_portmaster_lab.sh
          tools/package_portmaster_lab.sh build-v011 dist-v011
          unzip -l dist-v011/cursed-drone-performance-lab-aarch64-test.zip | tee /tmp/package.txt
          grep -q 'Cursed Drone Lab.sh' /tmp/package.txt
          grep -q 'curseddrone-lab/cursed-drone-sdl.aarch64' /tmp/package.txt
          grep -q 'curseddrone-lab/docs/experiment-lab.ru.md' /tmp/package.txt

      - name: Commit validated source only
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            CMakeLists.txt \
            docs/experiment-lab.en.md \
            docs/experiment-lab.ru.md \
            include/cursed_drone/session.hpp \
            packaging/portmaster/experiment/README.md \
            packaging/portmaster/experiment/port.json \
            src/audio.cpp \
            src/sdl_main.cpp \
            src/session.cpp \
            tests/test_main.cpp
          git commit -m 'v0.11: guided workflow and master effects'
          git push origin HEAD:experiment/v0.11-guided-workflow
