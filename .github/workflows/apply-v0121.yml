name: apply-v0121

on:
  pull_request:
    branches: [main]
    paths:
      - tools/v0121.patch.gz.b64
      - .github/workflows/apply-v0121.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v0.12.1-quick-menu-logo
          fetch-depth: 0
          submodules: recursive
      - name: Check patch state
        id: patch
        run: |
          if test -f tools/v0121.patch.gz.b64; then echo 'present=true' >> "$GITHUB_OUTPUT"; else echo 'present=false' >> "$GITHUB_OUTPUT"; fi
      - name: Verify and apply patch
        if: steps.patch.outputs.present == 'true'
        run: |
          test "$(wc -c < tools/v0121.patch.gz.b64)" -eq 7548
          echo '4deb479fe1fc117245e9fe40f4b7300bac51c7aff7437de25ac16ebf2131a386  tools/v0121.patch.gz.b64' | sha256sum -c -
          base64 -d tools/v0121.patch.gz.b64 | gzip -d > /tmp/v0121.patch
          echo '479610e25efeda65f21e777f0d4111c0024977d6c9b4231b2b664382990d35c9  /tmp/v0121.patch' | sha256sum -c -
          git apply --check /tmp/v0121.patch
          git apply /tmp/v0121.patch
          git diff --check
      - name: Install dependencies
        if: steps.patch.outputs.present == 'true'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev zip file
      - name: Build and test
        if: steps.patch.outputs.present == 'true'
        run: |
          cmake -S . -B build-v0121 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v0121 --parallel 2
          ctest --test-dir build-v0121 --output-on-failure
      - name: Handheld smoke test
        if: steps.patch.outputs.present == 'true'
        run: |
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy CURSED_DRONE_SKIP_SPLASH=1 CURSED_DRONE_HANDHELD=1 CURSED_DRONE_DATA_DIR="$PWD/test-conf" timeout 4s build-v0121/cursed-drone-sdl
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124
      - name: Package both handheld targets
        if: steps.patch.outputs.present == 'true'
        run: |
          chmod +x tools/package_portmaster.sh tools/package_nextui.sh
          tools/package_portmaster.sh build-v0121 dist-v0121
          tools/package_nextui.sh build-v0121 dist-v0121
          unzip -l dist-v0121/curseddrone-aarch64-test.zip > /tmp/portmaster.txt
          unzip -l dist-v0121/cursed-drone-nextui-tg5040-test.zip > /tmp/nextui.txt
          grep -q 'curseddrone/cursed-drone-sdl.aarch64' /tmp/portmaster.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/cursed-drone-sdl.aarch64' /tmp/nextui.txt
      - name: Commit validated source
        if: steps.patch.outputs.present == 'true'
        run: |
          git rm tools/v0121.patch.gz.b64
          git add CMakeLists.txt README.md docs packaging src/audio.cpp src/sdl_main.cpp
          git diff --check --cached
          git config user.name github-actions
          git config user.email actions@github.com
          git commit -m 'v0.12.1: fix quick menu guidance, logo and DSP waste'
          git push origin HEAD:fix/v0.12.1-quick-menu-logo
