name: publish-v0122

on:
  push:
    branches: [release/v0.12.2-event-clarity]
    paths: [.github/workflows/publish-v0122.yml]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Download validated build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/release /tmp/nextui /tmp/portmaster /tmp/macos
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/8536242385/zip" > /tmp/nextui.zip
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/8536241937/zip" > /tmp/portmaster.zip
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/8536237672/zip" > /tmp/macos.zip
          unzip -q /tmp/nextui.zip -d /tmp/nextui
          unzip -q /tmp/portmaster.zip -d /tmp/portmaster
          unzip -q /tmp/macos.zip -d /tmp/macos
          mv /tmp/nextui/cursed-drone-nextui-tg5040-test.zip /tmp/release/cursed-drone-v0.12.2-nextui-tg5040.zip
          mv /tmp/portmaster/curseddrone-aarch64-test.zip /tmp/release/cursed-drone-v0.12.2-portmaster-aarch64.zip
          (cd /tmp/macos && zip -qr /tmp/release/cursed-drone-v0.12.2-macos-arm64.zip .)
          (cd /tmp/release && sha256sum *.zip > SHA256SUMS.txt)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > /tmp/release-notes.md <<'EOF'
          ## Cursed Drone 0.12.2

          Event-driven actors are now visible, predictable and playable.

          ### What changed
          - **Trigger Now** manually fires the selected event actor.
          - **Event Rate** shows average frequency and a **MAX** upper-bound wait.
          - Actor cards flash `!` when manual or generated events fire.
          - **Hold B / Kill Silence** remains the emergency DSP/effects reset.
          - Session schema 11 persists per-actor event rate and migrates older sessions.
          - GPLv3 section 7 attribution/origin notices are included in all packages.
          - RU/EN workflow, architecture and installation guides are updated.

          ### Downloads
          - `cursed-drone-v0.12.2-nextui-tg5040.zip` — NextUI / TrimUI Brick.
          - `cursed-drone-v0.12.2-portmaster-aarch64.zip` — PortMaster / Knulli AArch64.
          - `cursed-drone-v0.12.2-macos-arm64.zip` — Apple Silicon macOS.
          - `SHA256SUMS.txt` — archive checksums.

          Validated by Linux SDL build and smoke test, macOS ARM64 build, and Ubuntu 20.04-compatible AArch64 package builds.
          EOF
          if gh release view v0.12.2 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "v0.12.2 already exists; refusing to overwrite it"
            exit 1
          fi
          gh release create v0.12.2 /tmp/release/* \
            --repo "$GITHUB_REPOSITORY" \
            --target 453daa2126c191470f498b7b0001c8a874c29dab \
            --title "Cursed Drone v0.12.2" \
            --notes-file /tmp/release-notes.md
