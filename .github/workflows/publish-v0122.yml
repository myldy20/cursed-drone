name: verify-v0122-release

on:
  push:
    branches: [release/v0.12.2-event-clarity]
    paths: [.github/workflows/publish-v0122.yml]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.12.2-event-clarity
          fetch-depth: 0
      - name: Verify tag and release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --force --tags
          test "$(git rev-list -n 1 v0.12.2)" = "453daa2126c191470f498b7b0001c8a874c29dab"
          mkdir -p /tmp/release
          gh release view v0.12.2 --repo "$GITHUB_REPOSITORY" --json tagName,targetCommitish,url,assets > /tmp/release.json
          jq -e '.tagName == "v0.12.2"' /tmp/release.json >/dev/null
          jq -e '[.assets[].name] | sort == (["SHA256SUMS.txt", "cursed-drone-v0.12.2-macos-arm64.zip", "cursed-drone-v0.12.2-nextui-tg5040.zip", "cursed-drone-v0.12.2-portmaster-aarch64.zip"] | sort)' /tmp/release.json >/dev/null
          gh release download v0.12.2 --repo "$GITHUB_REPOSITORY" --dir /tmp/release
          cd /tmp/release
          sha256sum -c SHA256SUMS.txt
      - name: Record successful verification
        run: |
          set -euo pipefail
          mkdir -p tools
          {
            echo 'Cursed Drone v0.12.2 release verified.'
            echo 'Tag commit: 453daa2126c191470f498b7b0001c8a874c29dab'
            echo 'Assets: NextUI, PortMaster/Knulli AArch64, macOS ARM64, SHA256SUMS'
          } > tools/v0.12.2.release-verified
          git add tools/v0.12.2.release-verified
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore: record v0.12.2 release verification'
          git push origin HEAD:release/v0.12.2-event-clarity
