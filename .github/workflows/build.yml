name: build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Branded SDL startup smoke test
        run: |
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            timeout 3s build/cursed-drone-sdl
          status=$?
          set -e
          test "$status" -eq 0 -o "$status" -eq 124
      - name: Render soundscape previews
        run: |
          mkdir -p previews
          build/cursed-drone-render previews/derelict.wav 30 derelict
          build/cursed-drone-render previews/factory.wav 30 factory
          build/cursed-drone-render previews/wasteland.wav 30 wasteland
          build/cursed-drone-render previews/wet-cave.wav 30 wet_cave
          build/cursed-drone-render previews/metro-car.wav 30 metro
          build/cursed-drone-render previews/broken-nursery.wav 30 nursery
          build/cursed-drone-render previews/bunker.wav 30 bunker
          build/cursed-drone-render previews/power-grid.wav 30 power_grid
          build/cursed-drone-render previews/deep-water.wav 30 deep_water
          build/cursed-drone-render previews/ash-field.wav 30 ash_field
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-soundscape-previews
          path: previews

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2
        run: brew install sdl2
      - name: Configure
        run: >-
          cmake -S . -B build-macos
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
      - name: Build
        run: cmake --build build-macos --parallel 3
      - name: Test
        run: ctest --test-dir build-macos --output-on-failure
      - name: Assemble test bundle
        run: |
          mkdir -p dist/cursed-drone-macos/assets/branding dist/cursed-drone-macos/docs
          cp build-macos/cursed-drone dist/cursed-drone-macos/
          cp build-macos/cursed-drone-sdl dist/cursed-drone-macos/
          cp build-macos/cursed-drone-probe dist/cursed-drone-macos/
          cp build-macos/cursed-drone-render dist/cursed-drone-macos/
          cp README.md LICENSE THIRD_PARTY_NOTICES.md dist/cursed-drone-macos/
          cp assets/branding/cursed-drone-splash.bmp dist/cursed-drone-macos/assets/branding/
          cp assets/branding/cursed-drone-banner.png dist/cursed-drone-macos/assets/branding/
          cp docs/install.en.md docs/install.ru.md dist/cursed-drone-macos/docs/
          cp third_party/font512/LICENSE dist/cursed-drone-macos/font512-UNLICENSE.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-macos-arm64
          path: dist/cursed-drone-macos

  portmaster-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build in Ubuntu 20.04 aarch64
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/src" -w /src arm64v8/ubuntu:20.04 \
            bash -ec '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends build-essential cmake pkg-config libsdl2-dev zip
              cmake -S . -B build-aarch64 -DCMAKE_BUILD_TYPE=Release
              cmake --build build-aarch64 --parallel 2
              ctest --test-dir build-aarch64 --output-on-failure
              strip build-aarch64/cursed-drone-sdl build-aarch64/cursed-drone-probe
              ./tools/package_portmaster.sh build-aarch64 dist
            '
      - name: Inspect binaries and package
        run: |
          file build-aarch64/cursed-drone-sdl build-aarch64/cursed-drone-probe
          unzip -l dist/curseddrone-aarch64-test.zip | tee /tmp/package-list.txt
          grep -q 'curseddrone/assets/cursed-drone-splash.bmp' /tmp/package-list.txt
          grep -q 'curseddrone/docs/install.en.md' /tmp/package-list.txt
          grep -q 'curseddrone/docs/install.ru.md' /tmp/package-list.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-portmaster-aarch64
          path: dist/curseddrone-aarch64-test.zip
