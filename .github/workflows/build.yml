name: build

on: [push, pull_request]

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-place-exact-ui:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          fetch-depth: 0
          submodules: recursive
      - name: Apply exact Place UI
        run: python3 scripts/apply_place_exact_ui.py
      - name: Validate patch
        run: git diff --check
      - name: Install SDL build dependency
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Build tests and reference snapshots
        run: |
          cmake -S . -B build-place -DCMAKE_BUILD_TYPE=Release
          cmake --build build-place --parallel 2 --target \
            cursed-drone-tests \
            cursed-drone-parameter-mapping-tests \
            cursed-drone-android-ui-snapshots
          ctest --test-dir build-place --output-on-failure
          build-place/cursed-drone-android-ui-snapshots android-ui-snapshots
          test -s android-ui-snapshots/android-place.bmp
      - name: Commit validated product files
        run: |
          git show HEAD^:.github/workflows/build.yml > .github/workflows/build.yml
          rm -f scripts/apply_place_exact_ui.py .github/workflows/apply-place-exact-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement exact Place visual system"
          git push origin HEAD:agent/android-audio-ui-rebuild

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --parallel 2
      - run: ctest --test-dir build --output-on-failure
      - name: Render Pixel 8 Pro Android UI snapshots
        run: |
          mkdir -p dist/android-ui-snapshots
          SDL_VIDEODRIVER=dummy build/cursed-drone-android-ui-snapshots dist/android-ui-snapshots
          test "$(find dist/android-ui-snapshots -name 'android-*.bmp' | wc -l)" -eq 5
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-android-ui-snapshots-2992x1344
          path: dist/android-ui-snapshots
      - name: Verify Musical engine is linked
        run: grep -q 'CURSED_DRONE_HAS_PLAITS=1' build/CMakeFiles/cursed_drone_core.dir/flags.make
      - name: Performance benchmark
        run: build/cursed-drone-benchmark 3 | tee performance-benchmark.txt
      - uses: actions/upload-artifact@v4
        with: {name: cursed-drone-performance-benchmark, path: performance-benchmark.txt}
      - name: Handheld SDL smoke test
        run: |
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy CURSED_DRONE_SKIP_SPLASH=1 CURSED_DRONE_HANDHELD=1 timeout 4s build/cursed-drone-sdl
          status=$?; test "$status" -eq 0 -o "$status" -eq 124

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - run: brew install sdl2
      - run: cmake -S . -B build-macos -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
      - run: cmake --build build-macos --parallel 3
      - run: ctest --test-dir build-macos --output-on-failure
      - name: Assemble bundle
        run: |
          mkdir -p dist/cursed-drone-macos/assets/branding dist/cursed-drone-macos/assets/scales dist/cursed-drone-macos/docs dist/cursed-drone-macos/licenses
          cp build-macos/cursed-drone build-macos/cursed-drone-sdl build-macos/cursed-drone-probe build-macos/cursed-drone-render build-macos/cursed-drone-benchmark dist/cursed-drone-macos/
          cp VERSION README.md LICENSE NOTICE.md ADDITIONAL_TERMS.md THIRD_PARTY_NOTICES.md dist/cursed-drone-macos/
          cp assets/branding/* dist/cursed-drone-macos/assets/branding/
          cp assets/scales/*.scl dist/cursed-drone-macos/assets/scales/
          cp docs/install.en.md docs/install.ru.md docs/install.android.en.md docs/install.android.ru.md docs/workflow.en.md docs/workflow.ru.md docs/effects.en.md docs/effects.ru.md dist/cursed-drone-macos/docs/
          cp third_party/PLAITS_LICENSE.txt dist/cursed-drone-macos/licenses/Musical-engine-MIT.txt
      - uses: actions/upload-artifact@v4
        with: {name: cursed-drone-macos-arm64, path: dist/cursed-drone-macos}

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CURSED_DRONE_PREVIEW_SIGNING: "1"
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android toolchain
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"
      - uses: gradle/actions/setup-gradle@v4
        with: {gradle-version: "8.10.2"}
      - name: Build release-optimised touch preview APK
        id: android_build
        continue-on-error: true
        run: |
          set -o pipefail
          gradle -p android :app:assembleRelease --stacktrace 2>&1 | tee android-build.log
      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-android-build-log
          path: android-build.log
      - name: Stop after Android build failure
        if: steps.android_build.outcome == 'failure'
        run: exit 1
      - name: Verify native release optimisation
        run: |
          test -d android/app/.cxx/Release
          grep -R -Eq -- '(^| )-O(2|3)( |$)' android/app/.cxx/Release
          ! grep -R -Eq -- '(^| )-O0( |$)' android/app/.cxx/Release
      - name: Verify APK identity and version
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee android-apk-badging.txt
          grep -q "versionName='$(cat VERSION)'" android-apk-badging.txt
          mkdir -p dist
          cp "$APK" "dist/cursed-drone-v$(cat VERSION)-android-arm64-release-preview.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-android-arm64-release-preview
          path: dist/cursed-drone-v*-android-arm64-release-preview.apk

  aarch64-packages:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - name: Build in Ubuntu 20.04 aarch64 container
        run: |
          docker run --rm -v "$PWD:/src" -w /src arm64v8/ubuntu:20.04 bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends build-essential cmake pkg-config libsdl2-dev zip file
            cmake -S . -B build-aarch64 -DCMAKE_BUILD_TYPE=Release
            cmake --build build-aarch64 --parallel 4
            ctest --test-dir build-aarch64 --output-on-failure
            strip build-aarch64/cursed-drone-sdl build-aarch64/cursed-drone-probe
            ./tools/package_portmaster.sh build-aarch64 dist
            ./tools/package_nextui.sh build-aarch64 dist
          '
      - name: Inspect packages
        run: |
          file build-aarch64/cursed-drone-sdl build-aarch64/cursed-drone-probe
          unzip -l dist/curseddrone-aarch64-test.zip | tee /tmp/pm.txt
          grep -q 'curseddrone/VERSION' /tmp/pm.txt
          grep -q 'curseddrone/assets/scales/19-edo.scl' /tmp/pm.txt
          grep -q 'curseddrone/docs/workflow.ru.md' /tmp/pm.txt
          grep -q 'curseddrone/licenses/Musical-engine-MIT.txt' /tmp/pm.txt
          grep -q 'curseddrone/licenses/NOTICE.md' /tmp/pm.txt
          grep -q 'curseddrone/licenses/ADDITIONAL_TERMS.md' /tmp/pm.txt
          unzip -l dist/cursed-drone-nextui-tg5040-test.zip | tee /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/VERSION' /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/launch.sh' /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/assets/scales/19-edo.scl' /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/docs/workflow.ru.md' /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/licenses/Musical-engine-MIT.txt' /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/licenses/NOTICE.md' /tmp/next.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/licenses/ADDITIONAL_TERMS.md' /tmp/next.txt
      - uses: actions/upload-artifact@v4
        with: {name: cursed-drone-portmaster-aarch64, path: dist/curseddrone-aarch64-test.zip}
      - uses: actions/upload-artifact@v4
        with: {name: cursed-drone-nextui-tg5040, path: dist/cursed-drone-nextui-tg5040-test.zip}
