name: apply-v07-patch

on:
  push:
    branches: [agent/v0.7-brick-production]
    paths:
      - tools/apply_v07_patch.py
      - .github/workflows/apply-v07.yml
  pull_request:
    branches: [agent/v0.6-sound-engines]
    paths:
      - tools/apply_v07_patch.py
      - .github/workflows/apply-v07.yml

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.7-brick-production
      - name: Correct README selector
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_v07_patch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('| выход | Escape | Menu / системная кнопка |',
                              '| выход | Escape | Menu / действие ОС |')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply production patch
        run: python3 tools/apply_v07_patch.py
      - name: Check patch
        run: git diff --check
      - name: Remove patch diagnostics
        run: rm -f docs/V07_PATCH_ERROR.txt
      - name: Export patched source
        run: |
          rm -rf .git
          tar -czf /tmp/cursed-drone-v07-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-v07-patched-source
          path: /tmp/cursed-drone-v07-source.tar.gz
          if-no-files-found: error
