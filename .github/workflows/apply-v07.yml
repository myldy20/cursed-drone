name: apply-v07-patch

on:
  push:
    branches: [agent/v0.7-brick-production]
    paths:
      - tools/apply_v07_patch.py
      - .github/workflows/apply-v07.yml
  pull_request:
    branches: [agent/v0.6-sound-engines]
    paths:
      - tools/apply_v07_patch.py
      - .github/workflows/apply-v07.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.7-brick-production
          fetch-depth: 0
      - name: Correct README selector
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_v07_patch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('| выход | Escape | Menu / системная кнопка |',
                              '| выход | Escape | Menu / действие ОС |')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply production patch
        id: apply
        continue-on-error: true
        run: python3 tools/apply_v07_patch.py > /tmp/v07-patch.log 2>&1
      - name: Save patch failure
        if: steps.apply.outcome == 'failure'
        run: |
          git reset --hard HEAD
          mkdir -p docs
          cp /tmp/v07-patch.log docs/V07_PATCH_ERROR.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/V07_PATCH_ERROR.txt
          git commit -m "Record v0.7 patch failure"
          git push origin HEAD:agent/v0.7-brick-production
          exit 1
      - name: Check patch
        if: steps.apply.outcome == 'success'
        run: git diff --check
      - name: Commit generated source
        if: steps.apply.outcome == 'success'
        run: |
          rm -f docs/V07_PATCH_ERROR.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v0.7: production sound and Brick interface"
          git push origin HEAD:agent/v0.7-brick-production
