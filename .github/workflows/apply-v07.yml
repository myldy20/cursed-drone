name: apply-v07-patch

on:
  pull_request:
    branches: [agent/v0.6-sound-engines]
    paths:
      - tools/apply_v07_patch.py
      - .github/workflows/apply-v07.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.7-brick-production
          fetch-depth: 0
      - name: Correct README selector
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_v07_patch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('| выход | Escape | Menu / системная кнопка |',
                              '| выход | Escape | Menu / действие ОС |')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply production patch
        run: python3 tools/apply_v07_patch.py
      - name: Restore helper files
        run: |
          git checkout HEAD -- tools/apply_v07_patch.py .github/workflows/apply-v07.yml
          rm -f docs/V07_PATCH_ERROR.txt
      - name: Validate generated source
        run: git diff --check
      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v0.7: production sound and Brick interface"
          git push origin HEAD:agent/v0.7-brick-production
