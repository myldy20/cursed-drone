name: apply-v07-patch

on:
  push:
    branches: [agent/v0.7-brick-production]
    paths:
      - tools/apply_v07_patch.py
      - .github/workflows/apply-v07.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.7-brick-production
          fetch-depth: 0
      - name: Apply production patch
        run: python3 tools/apply_v07_patch.py
      - name: Check patch
        run: git diff --check
      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v0.7: production sound and Brick interface"
          git push origin HEAD:agent/v0.7-brick-production
