name: mark-nextui-verified

on:
  pull_request:
    branches: [main]
    paths:
      - tools/mark_nextui_verified.py
      - .github/workflows/mark-nextui-verified.yml

permissions:
  contents: write

jobs:
  mark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nextui-tool-pak
          fetch-depth: 0
      - name: Update verified status
        run: python3 tools/mark_nextui_verified.py
      - name: Validate diff
        run: git diff --check
      - name: Remove temporary helper
        run: |
          git rm tools/mark_nextui_verified.py .github/workflows/mark-nextui-verified.yml
      - name: Commit verified status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/install.nextui.en.md docs/install.nextui.ru.md
          git commit -m "Mark TrimUI Brick NextUI package as verified"
          git push origin HEAD:agent/nextui-tool-pak
