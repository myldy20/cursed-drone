name: apply-v012-public-release

on:
  pull_request:
    branches: [main]
    paths:
      - tools/v012parts/**
      - .github/workflows/apply-v012-release.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.12-guided-workflow
          fetch-depth: 0
          submodules: false

      - name: Reconstruct and verify release patch
        run: |
          cat tools/v012parts/part-* > /tmp/v012.patch.gz.b64
          test "$(wc -c < /tmp/v012.patch.gz.b64)" -eq 124572
          echo '0b0a9fd9cb3f4647b2e4ccfd887263aa3bf288d47adf361cf49b32df23be2eea  /tmp/v012.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/v012.patch.gz.b64 | gzip -d > /tmp/v012.patch
          echo '7b4ea366352d1ea923ada2cac73c1257fbe6465b3270f35b358c4b4f1c74ff90  /tmp/v012.patch' | sha256sum -c -
          git apply --check --index /tmp/v012.patch

      - name: Apply public release source
        run: |
          git apply --index /tmp/v012.patch
          git submodule update --init --recursive
          git diff --check --cached

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev zip file

      - name: Configure, build and test
        run: |
          cmake -S . -B build-v012 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v012 --parallel 2
          ctest --test-dir build-v012 --output-on-failure

      - name: Handheld SDL smoke test
        run: |
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            CURSED_DRONE_SKIP_SPLASH=1 CURSED_DRONE_HANDHELD=1 \
            CURSED_DRONE_DATA_DIR="$PWD/test-conf" \
            timeout 4s build-v012/cursed-drone-sdl
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124

      - name: Build and inspect Knulli package
        run: |
          chmod +x tools/package_portmaster.sh tools/package_nextui.sh
          tools/package_portmaster.sh build-v012 dist-v012
          unzip -l dist-v012/curseddrone-aarch64-test.zip | tee /tmp/portmaster.txt
          grep -q 'Cursed Drone.sh' /tmp/portmaster.txt
          grep -q 'curseddrone/cursed-drone-sdl.aarch64' /tmp/portmaster.txt
          grep -q 'curseddrone/docs/workflow.ru.md' /tmp/portmaster.txt
          grep -q 'curseddrone/assets/scales/19-edo.scl' /tmp/portmaster.txt
          grep -q 'curseddrone/licenses/Musical-engine-MIT.txt' /tmp/portmaster.txt

      - name: Build and inspect NextUI package
        run: |
          tools/package_nextui.sh build-v012 dist-v012
          unzip -l dist-v012/cursed-drone-nextui-tg5040-test.zip | tee /tmp/nextui.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/launch.sh' /tmp/nextui.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/cursed-drone-sdl.aarch64' /tmp/nextui.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/docs/workflow.ru.md' /tmp/nextui.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/docs/install.nextui.ru.md' /tmp/nextui.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/assets/scales/19-edo.scl' /tmp/nextui.txt
          grep -q 'Tools/tg5040/Cursed Drone.pak/licenses/Musical-engine-MIT.txt' /tmp/nextui.txt

      - name: Remove release staging
        run: |
          git rm -r tools/v012parts
          git rm .github/workflows/apply-v012-release.yml
          git add -A
          git diff --check --cached

      - name: Commit validated public release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'v0.12: Guided Workflow public release'
          git push origin HEAD:release/v0.12-guided-workflow
