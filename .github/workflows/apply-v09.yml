name: clean-v09-artifacts

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-v09.yml

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.9-effects-branding
          fetch-depth: 0
      - name: Remove generated files
        run: |
          git rm -r --ignore-unmatch build-v09 dist-v09
          git rm --ignore-unmatch docs/V09_PATCH_ERROR.txt docs/V09_TEST_ERROR.txt
      - name: Commit clean source tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove generated v0.9 build artifacts"
          git push origin HEAD:agent/v0.9-effects-branding
