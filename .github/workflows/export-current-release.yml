name: export-current-release

on:
  pull_request:
    branches: [experiment/plaits-performance-lab]
    paths:
      - .github/workflows/export-current-release.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Export source tree
        run: |
          rm -rf .git
          tar -czf /tmp/cursed-drone-current-release.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-current-release-source
          path: /tmp/cursed-drone-current-release.tar.gz
          if-no-files-found: error
