name: actor-trigger-polish

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  polish:
    if: github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          fetch-depth: 0
          submodules: recursive
      - run: python3 scripts/polish_actor_trigger.py
      - name: Validate Actor snapshot
        run: |
          git diff --check
          docker run --rm -v "$PWD:/src" -w /src arm64v8/ubuntu:20.04 bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends build-essential cmake pkg-config libsdl2-dev
            cmake -S . -B build-trigger -DCMAKE_BUILD_TYPE=Release
            cmake --build build-trigger --parallel 4 --target cursed-drone-android-ui-snapshots
            mkdir -p dist/actor-trigger
            SDL_VIDEODRIVER=dummy build-trigger/cursed-drone-android-ui-snapshots dist/actor-trigger
            test -s dist/actor-trigger/android-actor.bmp
          '
      - name: Commit polished trigger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/cpp/approved_ui_actor_exact.inc
          git commit -m "Polish Actor trigger control"
          git push origin HEAD:agent/android-audio-ui-rebuild
      - uses: actions/upload-artifact@v4
        with:
          name: actor-trigger-polished-2992x1344
          path: dist/actor-trigger/android-actor.bmp
