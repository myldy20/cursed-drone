name: exact-fx-refinement

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  exact-fx:
    if: github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          fetch-depth: 0
          submodules: recursive
      - name: Apply exact FX screen
        run: python3 scripts/apply_exact_fx.py
      - name: Configure exact FX
        run: |
          git diff --check
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsdl2-dev
          cmake -S . -B build-exact-fx -DCMAKE_BUILD_TYPE=Release > exact-fx-config.log 2>&1
      - name: Compile exact FX
        id: compile
        continue-on-error: true
        run: |
          cmake --build build-exact-fx --parallel 2 --target \
            cursed-drone-tests \
            cursed-drone-parameter-mapping-tests \
            cursed-drone-android-ui-snapshots > exact-fx-build.log 2>&1
      - name: Upload exact FX diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-fx-compiler-diagnostics
          path: |
            exact-fx-config.log
            exact-fx-build.log
            android/app/src/main/cpp/approved_ui_fx_exact.inc
            android/app/src/main/cpp/approved_ui_fx_memory.inc
            android/app/src/main/cpp/android_approved_main.cpp
      - name: Stop after compile failure
        if: steps.compile.outcome == 'failure'
        run: exit 1
      - name: Test and render exact FX
        run: |
          ctest --test-dir build-exact-fx --output-on-failure
          mkdir -p dist/exact-fx
          SDL_VIDEODRIVER=dummy build-exact-fx/cursed-drone-android-ui-snapshots dist/exact-fx
          test -s dist/exact-fx/android-fx.bmp
      - name: Commit validated exact FX files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            android/app/src/main/cpp/android_approved_main.cpp \
            android/app/src/main/cpp/approved_ui_fx_exact.inc \
            android/app/src/main/cpp/approved_ui_fx_memory.inc
          git commit -m "Implement approved Android FX screen"
          git push origin HEAD:agent/android-audio-ui-rebuild
      - uses: actions/upload-artifact@v4
        with:
          name: exact-fx-2992x1344
          path: dist/exact-fx/android-fx.bmp
