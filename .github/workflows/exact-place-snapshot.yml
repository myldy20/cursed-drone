name: exact-place-refinement

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          fetch-depth: 0
          submodules: recursive
      - name: Install deterministic UI generator
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-pil fonts-dejavu-core
      - name: Generate exact Place refinement
        run: python3 scripts/refine_exact_place.py
      - name: Validate and render in AArch64 container
        run: |
          git diff --check
          docker run --rm -v "$PWD:/src" -w /src arm64v8/ubuntu:20.04 bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends build-essential cmake pkg-config libsdl2-dev
            cmake -S . -B build-snapshot -DCMAKE_BUILD_TYPE=Release
            cmake --build build-snapshot --parallel 4 --target \
              cursed-drone-tests \
              cursed-drone-parameter-mapping-tests \
              cursed-drone-android-ui-snapshots
            ctest --test-dir build-snapshot --output-on-failure
            mkdir -p dist/android-ui-snapshots
            SDL_VIDEODRIVER=dummy build-snapshot/cursed-drone-android-ui-snapshots dist/android-ui-snapshots
            test -s dist/android-ui-snapshots/android-place.bmp
          '
      - name: Commit validated product files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            android/app/src/main/cpp/approved_ui_font_data.hpp \
            android/app/src/main/cpp/approved_ui_place_exact.inc
          git commit -m "Align UI text baseline and remove Place footer"
          git push origin HEAD:agent/android-audio-ui-rebuild
      - uses: actions/upload-artifact@v4
        with:
          name: exact-place-v2-2992x1344
          path: dist/android-ui-snapshots
