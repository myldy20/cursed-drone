name: apply-v0.13.0

on:
  push:
    branches: [release/v0.13.0-performance-android]
    paths:
      - .github/workflows/apply-v0.13.0.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.13.0-performance-android
          submodules: false
          fetch-depth: 0
      - name: Apply validated v0.13.0 product patch
        shell: bash
        run: |
          set -euo pipefail
          cat .v0130/part* > /tmp/v0130.patch.gz.b64
          base64 -d /tmp/v0130.patch.gz.b64 | gzip -d > /tmp/v0130.patch
          git apply --check /tmp/v0130.patch
          git apply /tmp/v0130.patch
          # GitHub Actions tokens cannot update an existing workflow file.
          # The unified build workflow is installed separately through the GitHub connector.
          git checkout HEAD -- .github/workflows/build.yml
          rm -rf .v0130 .github/workflows/apply-v0.13.0.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "v0.13.0: unify platforms and optimize realtime DSP"
          git push origin HEAD:release/v0.13.0-performance-android
