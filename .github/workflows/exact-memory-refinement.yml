name: exact-memory-refinement

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  exact-memory:
    if: github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          fetch-depth: 0
          submodules: recursive
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libsdl2-dev
      - name: Integrate exact Memory screen
        run: python3 scripts/integrate_exact_memory.py
      - name: Validate exact Memory product code
        run: |
          git diff --check
          cmake -S . -B build-memory -DCMAKE_BUILD_TYPE=Release
          cmake --build build-memory --parallel 2 --target \
            cursed-drone-tests \
            cursed-drone-parameter-mapping-tests \
            cursed-drone-android-ui-snapshots
          ctest --test-dir build-memory --output-on-failure
          mkdir -p dist/memory
          SDL_VIDEODRIVER=dummy build-memory/cursed-drone-android-ui-snapshots dist/memory
          test -s dist/memory/android-memory.bmp
      - name: Commit validated exact Memory files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            android/app/src/main/cpp/android_approved_main.cpp \
            android/app/src/main/cpp/approved_ui_fx_memory.inc \
            tools/android_ui_snapshots.cpp
          git commit -m "Implement exact Android Memory screen"
          git push origin HEAD:agent/android-audio-ui-rebuild
      - uses: actions/upload-artifact@v4
        with:
          name: exact-memory-2992x1344
          path: dist/memory/android-memory.bmp
