name: export-audit-source

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths: [.github/workflows/export-audit-source.yml]

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.12.2
          submodules: recursive
      - name: Archive exact release source
        run: |
          rm -rf .git
          tar -czf /tmp/cursed-drone-v0.12.2-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-v0.12.2-source
          path: /tmp/cursed-drone-v0.12.2-source.tar.gz
          if-no-files-found: error
