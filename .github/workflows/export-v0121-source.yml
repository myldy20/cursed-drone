name: export-v0121-source

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/export-v0121-source.yml

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Export source tree
        run: |
          rm -rf .git
          tar -czf /tmp/cursed-drone-v0121-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: cursed-drone-v0121-source
          path: /tmp/cursed-drone-v0121-source.tar.gz
          if-no-files-found: error
