name: apply-v0.12.3-hotfix

on:
  push:
    branches: [release/v0.12.3-p1-hotfix]
    paths: [.github/workflows/apply-v0.12.3-hotfix.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.12.3-p1-hotfix
          submodules: false
          fetch-depth: 0
      - name: Apply validated hotfix
        shell: bash
        run: |
          cat > /tmp/v0123.patch.gz.b64 <<'PATCH'

PATCH
          base64 -d /tmp/v0123.patch.gz.b64 | gzip -d > /tmp/v0123.patch
          git apply --check /tmp/v0123.patch
          git apply /tmp/v0123.patch
          rm .github/workflows/apply-v0.12.3-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v0.12.3: P1 reliability and UX hotfixes"
          git push origin HEAD:release/v0.12.3-p1-hotfix
