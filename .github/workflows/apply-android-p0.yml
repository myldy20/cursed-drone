name: apply-android-p0

on:
  push:
    branches:
      - agent/android-approved-design
    paths:
      - scripts/apply_android_p0.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-approved-design
          fetch-depth: 0
          submodules: recursive
      - name: Apply Android P0 fixes
        run: python3 scripts/apply_android_p0.py
      - name: Validate patch
        run: git diff --check
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Build and test core mappings
        run: |
          cmake -S . -B build-p0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCURSED_DRONE_BUILD_SDL=OFF \
            -DCURSED_DRONE_BUILD_TOOLS=OFF
          cmake --build build-p0 --parallel 2
          ctest --test-dir build-p0 --output-on-failure
      - name: Commit product changes
        run: |
          rm scripts/apply_android_p0.py .github/workflows/apply-android-p0.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Android P0 interaction regressions"
          git push origin HEAD:agent/android-approved-design
