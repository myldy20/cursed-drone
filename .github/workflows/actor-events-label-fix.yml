name: actor-events-label-fix

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  label-fix:
    if: github.head_ref == 'agent/android-audio-ui-rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-audio-ui-rebuild
          fetch-depth: 0
          submodules: recursive
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libsdl2-dev
      - name: Fix Events rate label
        run: python3 scripts/fix_actor_event_rate_label.py
      - name: Validate Events snapshot
        run: |
          git diff --check
          cmake -S . -B build-events -DCMAKE_BUILD_TYPE=Release
          cmake --build build-events --parallel 2 --target cursed-drone-android-ui-snapshots cursed-drone-tests cursed-drone-parameter-mapping-tests
          ctest --test-dir build-events --output-on-failure
          mkdir -p dist/actor-events
          SDL_VIDEODRIVER=dummy build-events/cursed-drone-android-ui-snapshots dist/actor-events
          test -s dist/actor-events/android-actor-events.bmp
      - name: Commit validated label fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/cpp/approved_ui_actor_exact.inc
          git commit -m "Fix Actor Events rate label spacing"
          git push origin HEAD:agent/android-audio-ui-rebuild
      - uses: actions/upload-artifact@v4
        with:
          name: actor-events-final-2992x1344
          path: dist/actor-events/android-actor-events.bmp
