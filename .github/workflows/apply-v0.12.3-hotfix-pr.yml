name: apply-v0.12.3-hotfix-pr

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'release/v0.12.3-p1-hotfix'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.12.3-p1-hotfix
          submodules: false
          fetch-depth: 0
      - name: Apply validated hotfix and remove staging files
        shell: bash
        run: |
          base64 -d .github/v0123.patch.gz.b64 | gzip -d > /tmp/v0123.patch
          git apply --check /tmp/v0123.patch
          git apply /tmp/v0123.patch
          rm -f .github/v0123.patch.gz.b64
          rm -f .github/workflows/apply-v0.12.3-hotfix.yml
          rm -f .github/workflows/apply-v0.12.3-hotfix-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v0.12.3: P1 reliability and UX hotfixes"
          git push origin HEAD:release/v0.12.3-p1-hotfix
